name: dart_ipfs_quic
description: Native QUIC transport for dart_ipfs backed by the pure-Dart quic_lib package.
version: 0.2.0
homepage: https://github.com/joseerrojas/dart_ipfs
repository: https://github.com/joseerrojas/dart_ipfs

publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  ipfs_libp2p: ^0.5.6
  quic_lib:
    path: ../../../dart_quic

  dart_ipfs_core:
    path:
      ../dart_ipfs_core

  collection: ^1.18.0
  meta: ^1.12.0
  logging: ^1.2.0
  uuid: ^4.0.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
