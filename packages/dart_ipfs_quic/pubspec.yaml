name: dart_ipfs_quic
description: Native QUIC transport for dart_ipfs using Cloudflare quiche FFI.
version: 0.1.0
homepage: https://github.com/joseerrojas/dart_ipfs
repository: https://github.com/joseerrojas/dart_ipfs

publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  ffi: ^2.1.3
  ipfs_libp2p: ^0.5.6

  dart_ipfs_core:
    path:
      ../dart_ipfs_core

  collection: ^1.18.0
  meta: ^1.12.0

dev_dependencies:
  ffigen: ^20.1.1
  test: ^1.25.0
  lints: ^4.0.0

ffigen:
  name: QuicheBindings
  description: FFI bindings for Cloudflare quiche
  output: lib/src/generated/quiche_bindings.dart
  headers:
    entry-points:
      - native/quiche.h
  compiler-opts:
    - "-I"
    - "native"
  preamble: |
    // Copyright (c) 2024, Cloudflare, Inc.
    // SPDX-License-Identifier: BSD-2-Clause
  comments: false
  structs:
    rename: "Quiche_"
  enums:
    rename: "Quiche_"
  globals:
    rename: "Quiche_"
  functions:
    rename: "Quiche_"
