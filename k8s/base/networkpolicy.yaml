# networkpolicy.yaml
# Default NetworkPolicy for the dart_ipfs daemon.
# Allows ingress only on the documented daemon ports (swarm, API, gateway,
# metrics) and permits unrestricted egress for libp2p connectivity.
#
# The RPC API (port 5001) is intentionally not exposed to the cluster ingress
# controller by default; access it via port-forward or a dedicated overlay.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dart-ipfs
  namespace: dart-ipfs
  labels:
    app.kubernetes.io/name: dart-ipfs
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/part-of: dart-ipfs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dart-ipfs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Swarm, gateway, and metrics are reachable from any source.
    - ports:
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
    # API is restricted to same-namespace traffic only by default.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dart-ipfs
      ports:
        - protocol: TCP
          port: 5001
  egress:
    # DNS
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # General outbound connectivity for libp2p and bootstrap peers.
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
