# secret.yaml
# Placeholder Secret for sensitive node material.
# Overlays or external secret management (e.g. Sealed Secrets, Vault, SOPS)
# should replace these placeholder values before production deployment.
#
# Fields:
#   libp2p-identity-seed: base64-encoded 32-byte deterministic libp2p seed.
#                         Omit or regenerate per node; do not reuse across nodes.
#   api-auth-token:       base64-encoded RPC API bearer token (optional).
#   keystore-password:    base64-encoded password protecting the on-disk keystore.
#
# To generate a fresh 32-byte seed:
#   openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: dart-ipfs-keys
  namespace: dart-ipfs
  labels:
    app.kubernetes.io/name: dart-ipfs
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: dart-ipfs
type: Opaque
stringData:
  # PLACEHOLDER: replace with a real base64 seed before deploying.
  libp2p-identity-seed: ""
  # PLACEHOLDER: optional RPC API bearer token.
  api-auth-token: ""
  # PLACEHOLDER: keystore encryption password.
  keystore-password: ""
