# serviceaccount.yaml
# Minimal, dedicated ServiceAccount for the dart_ipfs workload.
# No cluster-scoped permissions are required for a single-node daemon.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dart-ipfs
  namespace: dart-ipfs
  labels:
    app.kubernetes.io/name: dart-ipfs
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: dart-ipfs
automountServiceAccountToken: false
