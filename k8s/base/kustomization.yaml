# kustomization.yaml
# Base Kustomization for dart_ipfs.
# Overlays in k8s/overlays/* reference this directory as a Kustomize base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/name: dart-ipfs
      app.kubernetes.io/part-of: dart-ipfs
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
    includeTemplates: true

images:
  - name: ghcr.io/jxoesneon/dart-ipfs
    newTag: "1.11.5"
