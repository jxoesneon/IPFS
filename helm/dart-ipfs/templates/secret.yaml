{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
{{- if or .Values.secrets.libp2pIdentitySeed .Values.secrets.apiAuthToken .Values.secrets.keystorePassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dart-ipfs.secretName" . }}
  labels:
    {{- include "dart-ipfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.libp2pIdentitySeed }}
  libp2p-identity-seed: {{ .Values.secrets.libp2pIdentitySeed | quote }}
  {{- end }}
  {{- if .Values.secrets.apiAuthToken }}
  api-auth-token: {{ .Values.secrets.apiAuthToken | quote }}
  {{- end }}
  {{- if .Values.secrets.keystorePassword }}
  keystore-password: {{ .Values.secrets.keystorePassword | quote }}
  {{- end }}
{{- end }}
{{- end }}
