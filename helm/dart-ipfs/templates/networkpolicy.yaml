{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dart-ipfs.fullname" . }}
  labels:
    {{- include "dart-ipfs.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dart-ipfs.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Swarm, gateway, and metrics are reachable from any source.
    - ports:
        - protocol: TCP
          port: {{ .Values.service.swarm.port }}
        - protocol: UDP
          port: {{ .Values.service.swarm.port }}
        - protocol: TCP
          port: {{ .Values.service.gateway.port }}
        - protocol: TCP
          port: {{ .Values.service.metrics.port }}
    # API is restricted to the same namespace or explicitly allowed namespaces.
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
        {{- range .Values.networkPolicy.apiIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.api.port }}
  egress:
    # DNS
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # General outbound connectivity for libp2p and bootstrap peers.
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: {{ .Values.service.swarm.port }}
        - protocol: UDP
          port: {{ .Values.service.swarm.port }}
{{- end }}
