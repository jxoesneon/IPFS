# docker-compose.yml
# Default dart_ipfs daemon deployment.
#
# The nginx reverse proxy overlay is available in docker-compose.override.yml
# under the `nginx` profile (`docker compose --profile nginx up`).
#
# The daemon binds the RPC API and gateway to 0.0.0.0 so the optional nginx
# overlay can reach them. The binary's default is localhost; the command below
# overrides it with explicit multiaddrs.
services:
  dart_ipfs:
    build:
      context: .
      target: runtime
    image: ${DART_IPFS_IMAGE:-ghcr.io/jxoesneon/dart-ipfs:1.11.5}
    container_name: dart_ipfs_daemon

    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"

    expose:
      - "5001"
      - "8080"
      - "8081"

    read_only: true
    user: "1000:1000"

    volumes:
      - ipfs_data:/data/ipfs
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M

    cap_drop:
      - ALL

    environment:
      - IPFS_DATA_DIR=/data/ipfs
      - IPFS_JSON_LOGS=true
      - IPFS_API_ADDR=/ip4/0.0.0.0/tcp/5001

    command:
      - "daemon"
      - "--api-addr"
      - "/ip4/0.0.0.0/tcp/5001"
      - "--gateway-addr"
      - "/ip4/0.0.0.0/tcp/8080"

    healthcheck:
      test: ["CMD", "/app/ipfs", "healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

    networks:
      - ipfs_net

networks:
  ipfs_net:
    driver: bridge

volumes:
  ipfs_data:
