syntax = "proto3";

package ipfs.ipns;

message IpnsEntry {
	enum ValidityType {
		// EOL specifies that the record is valid until a specific time.
		EOL = 0;
	}
	bytes value = 1;
	bytes signature = 2;
	ValidityType validityType = 3;
	bytes validity = 4;
	uint64 sequence = 5;
	uint64 ttl = 6;
	bytes pubKey = 7;
	// Kubo encodes the V2 signature in field 8 and the DAG-CBOR data in field 9
	// (swapped relative to the textual IPNS spec).
	bytes signatureV2 = 8;
	bytes data = 9;
}
