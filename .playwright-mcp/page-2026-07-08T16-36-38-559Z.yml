            - heading "Features" [level=2] [ref=f25e116]
            - list [ref=f25e117]:
              - listitem [ref=f25e118]:
                - strong [ref=f25e119]: QUIC transport
                - text: (RFC 9000, RFC 9001, RFC 9002) — wire encoding, packet protection, handshake, streams, flow control, congestion control.
              - listitem [ref=f25e120]:
                - strong [ref=f25e121]: HTTP/3
                - text: (RFC 9114) — mapping HTTP semantics onto QUIC with QPACK header compression.
              - listitem [ref=f25e122]:
                - strong [ref=f25e123]: WebTransport
                - text: (RFC 9220) — datagrams, bidirectional and unidirectional streams over HTTP/3.
              - listitem [ref=f25e124]:
                - strong [ref=f25e125]: libp2p QUIC
                - text: integration — multiaddr formats, security handshake, stream mapping.
              - listitem [ref=f25e126]:
                - strong [ref=f25e127]: Dart-native API
                - text: design —
                - code [ref=f25e128]: dart:io
                - text: integration,
                - code [ref=f25e129]: Stream
                - text: /
                - code [ref=f25e130]: Future
                - text: idioms, no native dependencies.
            - heading "Advanced features" [level=3] [ref=f25e131]
            - list [ref=f25e132]:
              - listitem [ref=f25e133]:
                - strong [ref=f25e134]: QPACK encoder/decoder stream instructions
                - text: (RFC 9204) — dynamic table capacity updates, insertions with name references, and duplicate instructions.
              - listitem [ref=f25e135]:
                - strong [ref=f25e136]: ORIGIN and PRIORITY_UPDATE frames
                - text: (RFC 9412 / RFC 9218) — origin management and priority signalling for HTTP/3.
              - listitem [ref=f25e137]:
                - strong [ref=f25e138]: RFC 9368 Compatible Version Negotiation
                - text: — negotiate QUIC versions without breaking the handshake.
              - listitem [ref=f25e139]:
                - strong [ref=f25e140]: CUBIC congestion control
                - text: (RFC 8312) — production-grade congestion controller with pacing.
              - listitem [ref=f25e141]:
                - strong [ref=f25e142]: QUIC bit greasing
                - text: (RFC 9287) — reserved bit randomisation for future extensibility.
              - listitem [ref=f25e143]:
                - strong [ref=f25e144]: ECN processing
                - text: (RFC 9000 Section 13.4) — explicit congestion notification on supported paths.
              - listitem [ref=f25e145]:
                - strong [ref=f25e146]: libp2p multistream-select and certificate generation
                - text: — TLS extension with Ed25519 peer authentication and ephemeral self-signed certificate generation.
              - listitem [ref=f25e147]:
                - strong [ref=f25e148]: WebTransport session support
                - text: (RFC 9220) — Extended CONNECT, capsule protocol, and session establishment over HTTP/3.
