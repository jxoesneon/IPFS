              - paragraph [ref=f25e180]:
                - strong [ref=f25e181]: Why no Web / WASM?
              - paragraph [ref=f25e182]:
                - code [ref=f25e183]: quic_lib
                - text: is a
                - emphasis [ref=f25e184]: wire-format
                - text: QUIC implementation — it encodes packets, manages connection IDs, runs the handshake state machine, and handles UDP I/O directly. Browsers intentionally do
                - strong [ref=f25e185]: not
                - text: "expose raw UDP sockets to web applications because of fundamental security risks: UDP can be used for DDoS amplification attacks, port scanning, DNS cache poisoning, and firewall bypassing. The web security model requires the browser to own the network stack."
              - paragraph [ref=f25e186]:
                - text: If you need QUIC-like functionality in a browser, use the
                - strong [ref=f25e187]: WebTransport API
                - text: (built into Chrome, Firefox, and Safari). The browser handles the QUIC wire protocol internally and exposes a high-level API. See
                - link "doc/WEB_AND_WASM.md" [ref=f25e188] [cursor=pointer]:
                  - /url: https://github.com/jxoesneon/quic_lib/blob/main/doc/WEB_AND_WASM.md
                - text: for a full explanation of the limitation and recommended alternatives.
