# docker-compose.override.yml
# Optional nginx reverse proxy overlay for the dart_ipfs daemon.
#
# This file is automatically merged by docker compose, but the nginx service is
# gated behind the `nginx` profile so it is not started by default.
#
# To start the daemon with the nginx proxy:
#   docker compose --profile nginx up
#
# Production note: replace the plain nginx proxy below with mTLS termination or
# an equivalent authenticated proxy before exposing the IPFS API.
services:
  nginx:
    image: nginx:alpine-slim
    container_name: dart_ipfs_proxy
    profiles:
      - nginx
    ports:
      - "127.0.0.1:5001:5001/tcp"
      - "127.0.0.1:8080:8080/tcp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      dart_ipfs:
        condition: service_healthy
    networks:
      - ipfs_net
