
# Minimal nginx reverse proxy for the dart_ipfs daemon.
#
# The dart_ipfs daemon exposes:
#   - 4001/tcp+udp : libp2p swarm (not proxied here)
#   - 5001/tcp     : RPC API
#   - 8080/tcp     : HTTP gateway
#
# Production note: replace this plain proxy with mTLS termination or an
# equivalent authenticated proxy before exposing the IPFS API.
events {
    worker_connections 1024;
}

http {
    # Header scrubbing & timeouts
    server_tokens off;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s;
    send_timeout 10s;

    upstream ipfs_gateway {
        server dart_ipfs:8080;
    }

    upstream ipfs_api {
        server dart_ipfs:5001;
    }

    server {
        listen 8080;
        server_name localhost;

        # Scrub headers (CVE-2020-35669 mitigation helper)
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        location / {
            proxy_pass http://ipfs_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Remove potentially malicious headers from client
            proxy_set_header Proxy "";
        }
    }

    server {
        listen 5001;
        server_name localhost;

        # Strict timeouts for API to prevent Slowloris
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        location / {
            proxy_pass http://ipfs_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Proxy "";
        }
    }
}
