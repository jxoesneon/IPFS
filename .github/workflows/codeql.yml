name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 1 * * 5'

jobs:
  analyze-js:
    name: Analyze (JavaScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript'
        config: |
          paths-ignore:
            - 'doc/api/**'
            - '.dart_tool/**'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:javascript"

  analyze-swift:
    name: Analyze (Swift)
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate Flutter Dependencies
      run: |
        cd example/ipfs_dashboard
        flutter pub get

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'swift'

    - name: Build macOS Dashboard
      run: |
        cd example/ipfs_dashboard
        flutter pub get
        flutter build macos --debug --config-only
        xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Debug -destination 'platform=macOS,name=Any Mac' CODE_SIGNING_ALLOWED=NO build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:swift"
